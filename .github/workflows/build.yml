name: Build catdoc

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential autoconf git

    - name: Clone catdoc source code
      # 此处已更正为有效的镜像地址
      run: git clone https://github.com/petewarden/catdoc.git

    - name: Configure and Build
      run: |
        cd catdoc
        ./configure
        make

    - name: Upload compiled binaries
      uses: actions/upload-artifact@v4
      with:
        name: catdoc-binaries
        path: |
          catdoc/src/catdoc
          catdoc/src/xls2csv
          catdoc/src/catppt
