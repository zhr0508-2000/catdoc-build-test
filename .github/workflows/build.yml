name: Build catdoc for ARM64

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential autoconf git gcc-aarch64-linux-gnu

    - name: Clone catdoc source code
      run: git clone https://github.com/petewarden/catdoc.git

    - name: Configure and Build
      run: |
        cd catdoc
        ./configure --host=aarch64-linux-gnu CC=aarch64-linux-gnu-gcc
        make CC=aarch64-linux-gnu-gcc

    - name: Upload compiled binaries
      uses: actions/upload-artifact@v4
      with:
        name: catdoc-binaries-arm64
        path: |
          catdoc/src/catdoc
          catdoc/src/xls2csv
          catdoc/src/catppt
